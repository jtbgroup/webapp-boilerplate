services:

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: webappboilerplate
      POSTGRES_USER: webappboilerplate
      POSTGRES_PASSWORD: webappboilerplate
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webappboilerplate"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"   # nginx → frontend + proxy /api
      - "5005:5005"   # remote debug
    environment:
      DB_URL: jdbc:postgresql://db:5432/webappboilerplate
      DB_USERNAME: webappboilerplate
      DB_PASSWORD: webappboilerplate
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend       # Spring Boot source (hot-reload Java)
      - ./frontend:/app/frontend     # Angular source (ng build --watch)
      - maven_cache:/root/.m2
      - node_modules:/app/frontend/node_modules

volumes:
  pg_data_dev:
  maven_cache:
  node_modules: