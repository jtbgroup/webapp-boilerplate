services:

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: productgen
      POSTGRES_USER: productgen
      POSTGRES_PASSWORD: productgen
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U productgen"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
      - "5005:5005"
    environment:
      DB_URL: jdbc:postgresql://db:5432/productgen
      DB_USERNAME: productgen
      DB_PASSWORD: productgen
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "4300:4300"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pg_data_dev:
  maven_cache:
