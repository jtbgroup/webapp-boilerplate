services:

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"   # nginx → frontend + proxy /api
      - "5005:5005"   # remote debug
    environment:
      SPRING_PROFILES_ACTIVE: h2
      SERVER_PORT: 8081   # Spring Boot interne ; nginx expose 8080
    volumes:
      - ./backend:/app/backend          # Spring Boot source (hot-reload via mvn)
      - ./frontend:/app/frontend        # Angular source (ng build --watch)
      - maven_cache:/root/.m2
      - node_modules:/app/frontend/node_modules
      - h2_data:/app/backend/data       # Persistance H2 (chemin relatif ./data dans application-h2.yml)

volumes:
  maven_cache:
  node_modules:
  h2_data: