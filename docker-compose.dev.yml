services:

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: webappboilerplate
      POSTGRES_USER: webappboilerplate
      POSTGRES_PASSWORD: webappboilerplate
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webappboilerplate"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app/backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/webappboilerplate
      DB_USERNAME: webappboilerplate
      DB_PASSWORD: webappboilerplate
      SERVER_PORT: 8080
    volumes:
      - ./backend:/app/backend
      - maven_cache:/root/.m2
    command: sh -c "cd /app/backend && mvn -q spring-boot:run"

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app/frontend
      - node_modules:/app/frontend/node_modules
    command: sh -c "cd /app/frontend && npm ci && npm run start -- --host 0.0.0.0 --port 4200"

  nginx:
    image: nginx:1.28-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data_dev:
  maven_cache:
  node_modules:
