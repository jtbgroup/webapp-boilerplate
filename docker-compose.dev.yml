version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: webappboilerplate-backend-dev
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: h2
      SERVER_PORT: 8080
      MAVEN_OPTS: "-Xmx512m -Xms256m"
    volumes:
      # Source code for hot reload
      - ./backend/src:/app/backend/src
      - ./backend/pom.xml:/app/pom.xml
      # Maven cache
      - maven-cache:/root/.m2
      # H2 data persistence
      - webappboilerplate-h2-data:/app/data
    networks:
      - webappboilerplate-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/auth/me" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: webappboilerplate-frontend-dev
    ports:
      - "4300:4200"
    environment:
      ANGULAR_SERVE_HOST: 0.0.0.0
      ANGULAR_SERVE_PORT: 4200
    volumes:
      # Source code for hot reload
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/angular.json:/app/angular.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
      # npm node_modules (avoid sync overhead)
      - /app/node_modules
    networks:
      - webappboilerplate-network
    depends_on:
      - backend
    command: npm run start
    stdin_open: true
    tty: true

volumes:
  webappboilerplate-h2-data:
    driver: local
  maven-cache:
    driver: local

networks:
  webappboilerplate-network:
    driver: bridge
