server {
    listen 8080;

    # Angular static files (built by ng build --watch into /app/static)
    root /app/static;
    index index.html;

    # Proxy all /api requests to Spring Boot (internal port 8081)
    location /api/ {
        proxy_pass         http://localhost:8081/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Angular SPA fallback — all unknown routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}