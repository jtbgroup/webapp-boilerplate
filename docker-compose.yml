services:

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webappboilerplate}
      POSTGRES_USER: ${POSTGRES_USER:-webappboilerplate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webappboilerplate}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-webappboilerplate}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-webappboilerplate}
      DB_USERNAME: ${POSTGRES_USER:-webappboilerplate}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-webappboilerplate}
      SERVER_PORT: 8081
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
