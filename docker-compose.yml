version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    container_name: webappboilerplate-postgres
    environment:
      POSTGRES_DB: webappboilerplate
      POSTGRES_USER: webappboilerplate
      POSTGRES_PASSWORD: ${DB_PASSWORD:-webappboilerplate}
    ports:
      - "5432:5432"
    volumes:
      - webappboilerplate-postgres-data:/var/lib/postgresql/data
    networks:
      - webappboilerplate-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U webappboilerplate" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: webappboilerplate-app
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SERVER_PORT: 8090
      DB_URL: jdbc:postgresql://postgres:5432/webappboilerplate
      DB_USERNAME: webappboilerplate
      DB_PASSWORD: ${DB_PASSWORD:-webappboilerplate}
      DB_POOL_SIZE: 20
      DB_MIN_IDLE: 5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - webappboilerplate-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8090/api/auth/me" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  webappboilerplate-postgres-data:
    driver: local

networks:
  webappboilerplate-network:
    driver: bridge
