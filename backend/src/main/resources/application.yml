spring:
  web:
    resources:
      static-locations: classpath:/static/browser/

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/webappboilerplate}
    username: ${DB_USERNAME:webappboilerplate}
    password: ${DB_PASSWORD:webappboilerplate}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  session:
    store-type: none

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: never
    include-binding-errors: never

logging:
  level:
    org.springframework.security: INFO
    com.webappboilerplate: DEBUG
